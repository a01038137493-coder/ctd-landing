<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>濡쒓렇????Connect the dots</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #FF7A00; --bg: #000; --panel: #141414; --border: rgba(255,255,255,.08); --border-2: rgba(255,255,255,.14); --sale-red: #FF4D4F; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: #fff; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    input { font-family: inherit; }

    /* NAV */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: rgba(0,0,0,.55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 64px; }
    .nav-logo-text { display: flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .nav-logo-dot { width: 9px; height: 9px; background: var(--orange); border-radius: 50%; }
    .nav-menu { display: flex; gap: 0; list-style: none; position: absolute; left: 50%; top: 0; height: 100%; transform: translateX(-50%); }
    .nav-menu li a { display: flex; align-items: center; height: 64px; padding: 0 16px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,.8); transition: color .2s; }
    .nav-menu li a:hover { color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-right a { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.8); transition: color .2s; }
    .nav-right a:hover { color: #fff; }
    .nav-cart { background: var(--orange); color: #fff !important; padding: 8px 18px; border-radius: 6px; font-weight: 700 !important; display: inline-flex; align-items: center; }
    @media (max-width: 960px) { .nav-menu { display: none; } }

    /* AUTH PAGE */
    .auth-wrap { min-height: 100vh; padding: 120px 24px 60px; display: flex; align-items: center; justify-content: center; }
    .auth-box {
      width: 100%; max-width: 400px;
      background: var(--panel); border: 1px solid var(--border);
      padding: 44px 36px;
      border-radius: 12px;
    }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: 7px; font-size: 16px; font-weight: 800; margin-bottom: 28px; }
    .auth-logo-dot { width: 9px; height: 9px; background: var(--orange); border-radius: 50%; }
    .auth-title { font-size: 22px; font-weight: 900; letter-spacing: -.5px; margin-bottom: 8px; text-align: center; }
    .auth-sub { font-size: 13px; color: rgba(255,255,255,.5); text-align: center; margin-bottom: 32px; }

    .field { margin-bottom: 16px; }
    .field-label { display: block; font-size: 12px; font-weight: 700; color: rgba(255,255,255,.6); margin-bottom: 6px; letter-spacing: .2px; }
    .input {
      width: 100%; background: #0A0A0A;
      border: 1px solid var(--border-2);
      border-radius: 6px;
      padding: 12px 14px;
      color: #fff; font-size: 14px;
      transition: border-color .15s ease;
    }
    .input:focus { outline: none; border-color: var(--orange); }

    .auth-submit {
      display: block; width: 100%; margin-top: 8px;
      padding: 14px; background: var(--orange); color: #fff;
      border: none; border-radius: 6px;
      font-size: 14px; font-weight: 800;
      transition: opacity .15s ease;
    }
    .auth-submit:hover { opacity: .92; }
    .auth-submit:disabled { opacity: .5; cursor: not-allowed; }

    .auth-error {
      margin-top: 14px; font-size: 12px; color: var(--sale-red);
      min-height: 16px; text-align: center;
    }

    .auth-divider {
      margin: 28px 0 20px; text-align: center; position: relative;
      font-size: 11px; color: rgba(255,255,255,.35); letter-spacing: 2px;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; position: absolute; top: 50%; width: calc(50% - 30px); height: 1px;
      background: var(--border);
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }

    .auth-alt {
      text-align: center; font-size: 13px; color: rgba(255,255,255,.55);
    }
    .auth-alt a { color: var(--orange); font-weight: 700; margin-left: 4px; }
    .auth-alt a:hover { text-decoration: underline; }

    .auth-back {
      display: block; text-align: center; margin-top: 32px;
      font-size: 12px; color: rgba(255,255,255,.4);
    }
    .auth-back:hover { color: #fff; }

    /* FOOTER */
    footer { background: #000; color: rgba(255,255,255,.35); padding: 32px 40px; text-align: center; font-size: 12px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo-text"><span class="nav-logo-dot"></span>Connect the dots</a>
  <ul class="nav-menu">
    <li><a href="/shop.html">SHOP</a></li>
    <li><a href="/inspire.html">INSPIRE</a></li>
    <li><a href="/membership.html">Membership</a></li>
    <li><a href="/about.html">About</a></li>
  </ul>
  <div class="nav-right">
    <a href="/login.html">濡쒓렇??/a>
    <a href="/cart.html" class="nav-cart">?λ컮援щ땲</a>
  </div>
</nav>

<main class="auth-wrap">
  <form class="auth-box" id="login-form" autocomplete="on">
    <div class="auth-logo"><span class="auth-logo-dot"></span>Connect the dots</div>
    <h1 class="auth-title">濡쒓렇??/h1>
    <p class="auth-sub">怨꾩젙?쇰줈 濡쒓렇?명븯怨??숈뒿???댁뼱媛?몄슂.</p>

    <div class="field">
      <label class="field-label" for="email">?대찓??/label>
      <input class="input" id="email" type="email" autocomplete="username" required maxlength="80" placeholder="you@example.com" />
    </div>

    <div class="field">
      <label class="field-label" for="password">鍮꾨?踰덊샇</label>
      <input class="input" id="password" type="password" autocomplete="current-password" required minlength="6" maxlength="60" />
    </div>

    <button class="auth-submit" type="submit" id="btn-submit">濡쒓렇????/button>
    <div class="auth-error" id="error"></div>

    <div class="auth-divider">OR</div>
    <p class="auth-alt">?꾩쭅 ?뚯썝???꾨땲?좉???<a href="/signup.html">?뚯썝媛????/a></p>

    <a class="auth-back" href="/">???덉쑝濡??뚯븘媛湲?/a>
  </form>
</main>

<footer>짤 2024 Connect the dots</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/products.js"></script>
<script src="js/auth.js"></script>
<script>
  const form = document.getElementById('login-form');
  const errEl = document.getElementById('error');
  const btn = document.getElementById('btn-submit');

  // If already logged in, redirect to home
  CTDAuth.getUser().then(user => {
    if (user) location.href = '/';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.textContent = '';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return;

    btn.disabled = true; btn.textContent = '濡쒓렇??以?..';
    try {
      await CTDAuth.signIn(email, password);
      const next = new URLSearchParams(location.search).get('next') || '/';
      location.href = next;
    } catch (err) {
      const msg = (err && err.message) || '濡쒓렇?몄뿉 ?ㅽ뙣?덉뒿?덈떎.';
      // Map common Supabase errors to Korean
      if (/Invalid login credentials/i.test(msg)) {
        errEl.textContent = '?대찓???먮뒗 鍮꾨?踰덊샇媛 ?щ컮瑜댁? ?딆뒿?덈떎.';
      } else if (/Email not confirmed/i.test(msg)) {
        errEl.textContent = '?대찓???몄쬆???꾨즺?섏? ?딆븯?듬땲??';
      } else {
        errEl.textContent = msg;
      }
      btn.disabled = false; btn.textContent = '濡쒓렇????;
    }
  });
</script>

</body>
</html>
